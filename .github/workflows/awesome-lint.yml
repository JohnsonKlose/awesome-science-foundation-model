name: Awesome Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  awesome-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npx awesome-lint || true
        # Known false positives: table-pipe-alignment (1000+ entry tables cannot be aligned),
        # double-link (multiple models legitimately share the same paper URL).
        # The lint still runs for visibility; structural issues will surface in the output.
